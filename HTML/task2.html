<!DOCTYPE html>
<html>
<head>
<title>Task 2 - Web Development</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f7fa;
}

/* Header */

header{
background:#0d6efd;
color:white;
text-align:center;
padding:20px;
}

/* Navbar */

nav{
display:flex;
justify-content:center;
background:#084298;
}

nav a{
color:white;
padding:12px 18px;
text-decoration:none;
}

nav a:hover{
background:#052c65;
}

/* Layout */

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

/* Cards */

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* Form */

label{
font-weight:bold;
}

input, textarea{
width:100%;
padding:8px;
margin:6px 0 12px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#0d6efd;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0b5ed7;
}

/* ToDo */

li{
margin:8px 0;
display:flex;
justify-content:space-between;
background:#eef3ff;
padding:6px 10px;
border-radius:5px;
}

.deleteBtn{
background:red;
padding:5px 8px;
border:none;
color:white;
cursor:pointer;
border-radius:4px;
}

/* Footer */

footer{
text-align:center;
padding:10px;
background:#ddd;
margin-top:20px;
}

/* Responsive */

@media(max-width:768px){
.container{
grid-template-columns:1fr;
}
}

</style>

<script>

/* Form Validation */

function validateForm(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();

let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(name === ""){
alert("Please enter your name");
return false;
}

if(!email.match(emailPattern)){
alert("Please enter a valid email");
return false;
}

alert("Form submitted successfully!");
return true;
}

/* To-Do List */

function addTask(){

let taskInput = document.getElementById("task");
let task = taskInput.value.trim();

if(task === ""){
alert("Please enter a task");
return;
}

let li = document.createElement("li");

li.innerHTML = task + 
" <button class='deleteBtn' onclick='removeTask(this)'>Delete</button>";

document.getElementById("list").appendChild(li);

taskInput.value = "";
}

function removeTask(btn){
btn.parentElement.remove();
}

</script>

</head>

<body>

<header>
<h1>Web Development Task - 2</h1>
<p>Hello, I am Sukriti Kumari. I developed this webpage using HTML, CSS, and JavaScript as part of my internship task.</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Contact</a>
<a href="#">To-Do</a>
</nav>

<div class="container">

<!-- Contact Form -->

<div class="card">
<h2>Contact Form</h2>

<form onsubmit="return validateForm()">

<label>Name:</label>
<input type="text" id="name" placeholder="Enter your name">

<label>Email:</label>
<input type="email" id="email" placeholder="Enter your email">

<label>Message:</label>
<textarea placeholder="Enter your message"></textarea>

<button type="submit">Submit</button>

</form>
</div>

<!-- To-Do List -->

<div class="card">
<h2>To-Do List</h2>

<input type="text" id="task" placeholder="Enter a task">
<button onclick="addTask()">Add Task</button>

<ul id="list"></ul>

</div>

</div>

<footer>
<p>© 2026 Sukriti Kumari | Internship Project</p>
</footer>

</body>
</html>
